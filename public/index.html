<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-bottom: 10px;
}

button {
    padding: 12px;
    margin: 5px;
    font-size: 16px;
}

#reader {
    margin-top: 15px;
}
</style>
</head>

<body>

<h2>Escanear o escribir código</h2>

<input id="textInput" placeholder="Escanea o escribe código">

<button onclick="startScanner()">📷 Escanear con cámara</button>
<button onclick="printQR()">🖨 Imprimir</button>
<button onclick="clearField()">Limpiar</button>

<div id="reader"></div>
<div id="camWarning" style="color:red; display:none">
⚠ Cámara no disponible. Use ingreso manual.
</div>

<script>
const input = document.getElementById('textInput');

// Detectar soporte de cámara
function cameraSupported() {
    return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
}

// Mostrar aviso si no hay soporte
window.addEventListener('load', () => {
    if (!cameraSupported()) {
        alert('⚠️ Este navegador no soporta acceso a cámara.\nPuedes ingresar el código manualmente.');
    }
});

// Función para abrir cámara
async function startScanner() {
    if (!cameraSupported()) {
        
        alert('Cámara no soportada en este navegador.');
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        alert('Cámara disponible. Aquí puedes integrar lector QR.');
        stream.getTracks().forEach(t => t.stop()); // cerrar cámara
    } catch (err) {
        alert('No se pudo acceder a la cámara: ' + err.message);
    }
}

// Imprimir
function printQR() {
    const text = input.value;
    if (!text) return;

    fetch('/print', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
    })
        .then(r => r.text())
        .then(msg => {
            alert(msg);
            clearField();
        })
        .catch(e => alert(e.message));
}

function clearField() {
    input.value = '';
    document.getElementById('qrcode').innerHTML = '';
}
</script>

</body>
</html>
