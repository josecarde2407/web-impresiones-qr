<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-bottom: 10px;
}

button {
    padding: 12px;
    margin: 5px;
    font-size: 16px;
}

#reader {
    margin-top: 15px;
}
</style>
</head>

<body>

<h2>Escanear o escribir código</h2>

<input id="textInput" placeholder="Escanea o escribe código">

<button onclick="startScanner()">📷 Escanear con cámara</button>
<button onclick="printQR()">🖨 Imprimir</button>
<button onclick="clearField()">Limpiar</button>

<div id="reader"></div>

<script>
let scanner = null;

function startScanner() {
    const reader = document.getElementById("reader");
    reader.innerHTML = "";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" }, // cámara trasera
        { fps: 10, qrbox: 250 },
        (decodedText) => {
            document.getElementById("textInput").value = decodedText;

            // detener cámara
            scanner.stop();

            // OPCIONAL: imprimir automático
            // printQR();
        },
        (err) => {}
    );
}

function printQR() {
    const text = document.getElementById('textInput').value;
    if (!text) return alert("Ingrese o escanee un código");

    fetch('/print', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
    })
    .then(r => r.text())
    .then(msg => {
        alert(msg);
        clearField();
    })
    .catch(err => alert(err));
}

function clearField() {
    document.getElementById('textInput').value = '';
    document.getElementById('reader').innerHTML = '';
}
</script>

</body>
</html>
