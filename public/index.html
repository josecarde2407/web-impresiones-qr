<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR e Impresión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        #qrcode {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Generar Etiqueta e Imprimir</h1>
    <input type="text" id="textInput" placeholder="Ingresa en formato: LETRA-UBICACION-NIVEL-PROFUNDIDAD">
    <button onclick="clearField()">Limpiar</button>
    <div id="qrcode"></div>
    <button onclick="printQR()">Imprimir</button>

    <script>
        function printQR() {
            const text = document.getElementById('textInput').value;
            if (!text) return;
            fetch('/print', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error en la impresión: ' + response.statusText);
                    }
                    return response.text();
                })
                .then(data => {
                    alert(data);
                    clearField(); // Limpiar después de imprimir
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error al imprimir: ' + error.message);
                });
        }

        function clearField() {
            document.getElementById('textInput').value = '';
            document.getElementById('qrcode').innerHTML = '';
        }
    </script>
</body>

</html>
